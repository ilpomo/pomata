name: Informational

# Non-gating parity / floor checks, kept off the PR critical path (like `benchmark.yml`). They block nothing but show
# red so a real divergence is visible: the differential compares each indicator to TA-Lib (a mismatch flags either a
# real bug or an undocumented convention difference to investigate), and the dependency-floor resolves the lowest
# versions the constraints allow to prove the declared `polars` floor is a tested promise, not a guess. They run on
# every push to main (a regressing merge is flagged immediately, and you know which merge), on a nightly schedule, and
# on demand via the Actions "Run workflow" button.
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 3 * * *" # 03:30 UTC daily, offset from the 03:00 benchmark cron; GitHub disables the schedule after 60 days with no repo activity
  workflow_dispatch:

# Least-privilege token: these jobs only read the repo (checkout).
permissions:
  contents: read

# Don't pile up overlapping runs (push to main + nightly schedule + manual dispatch); never cancel an in-flight run.
concurrency:
  group: informational-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

# Skip uv's implicit per-run sync: each job's explicit `uv sync` installs exactly the lean group set.
env:
  UV_NO_SYNC: "1"

jobs:
  # Differential parity against TA-Lib (the C reference). A mismatch flags either a real bug or an undocumented
  # convention difference to investigate -- it shows red here rather than blocking a merge.
  differential:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "Setup: checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Setup: install uv"
        uses: ./.github/actions/setup
      - name: "Setup: sync dependencies (test + differential)"
        run: uv sync --locked --no-default-groups --group test --group differential
      - name: "Differential: parity vs TA-Lib"
        run: uv run pytest -m differential

  # Prove the declared dependency floor: resolve the LOWEST versions the constraints allow (ignoring the lockfile) and
  # run the suite, so the declared `polars` floor stays a tested promise. Pinned to Python 3.12 -- the floor release
  # predates the 3.14 wheels. An un-pinned transitive release could break the lowest-direct resolution; it shows red
  # here to investigate rather than blocking a merge.
  dependency-floor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Setup: checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Setup: install uv"
        uses: ./.github/actions/setup
        with:
          python-version: "3.12" # the polars floor predates the 3.14 wheels; pin to a Python the floor supports
      - name: "Setup: sync lowest-direct dependencies"
        run: uv sync --no-default-groups --group test --resolution lowest-direct
      - name: "Tests: full suite at the dependency floor"
        env:
          HYPOTHESIS_PROFILE: ci
        run: uv run --no-sync pytest -n auto
