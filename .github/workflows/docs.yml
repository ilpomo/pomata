name: Docs

# Build the Sphinx site on every push to main and every (non-draft) PR, so a broken docs build is caught before
# merge; publish to GitHub Pages only from main. Pages must be enabled (Settings -> Pages -> Source: "GitHub
# Actions"), a public-repo feature -- until then the deploy job is skipped and the build still validates with -W.
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

# Least-privilege by default; the deploy job widens to the Pages scopes it needs.
permissions:
  contents: read

# GitHub's recommended Pages concurrency: never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  UV_NO_SYNC: "1"

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Setup: checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # hatch-vcs reads tags to stamp the version shown in the docs
      - name: "Setup: install uv"
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.17"
          python-version: "3.14"
          enable-cache: true
      - name: "Setup: sync docs dependencies"
        run: uv sync --locked --no-default-groups --group docs
      - name: "Docs: build (warnings are errors)"
        run: uv run sphinx-build -W -b html docs docs/_build/html
      - name: "Docs: run the example doctests"
        run: uv run sphinx-build -b doctest docs docs/_build/doctest
      - name: "Docs: upload Pages artifact"
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/_build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write # publish to Pages
      id-token: write # OIDC token the deploy action verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Pages: deploy"
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
