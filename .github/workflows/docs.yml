name: Docs

# Build the Sphinx site on every push to main and every (non-draft) PR, so a broken docs build is caught before merge
# (warnings are errors). Publishing to GitHub Pages is deliberately decoupled from merges: the deploy runs on a nightly
# schedule and on manual `workflow_dispatch`, never per-merge. This stops the intermittent GitHub Pages backend flake
# ("Deployment failed, try again later") from ever reddening a merge -- a flaked nightly just re-publishes the next
# night, or you dispatch one on demand. Publishing is gated on the `PAGES_ENABLED` repository variable being `true`;
# set it at go-live, after enabling Pages (Settings -> Pages -> Source: "GitHub Actions"), a public-repo feature.
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily publish, offset from the other scheduled jobs
  workflow_dispatch:

# Least-privilege by default; the deploy job widens to the Pages scopes it needs.
permissions:
  contents: read

# Per-ref concurrency: cancel a superseded PR docs build (as ci.yml does), but never cancel a non-PR run -- the
# workflow-level cancel would otherwise kill an in-flight Pages deploy (carried by the scheduled / dispatched publish),
# which the deploy job's own `pages` queue cannot prevent (that queue guards deploys against each other, not against
# the parent run's cancellation). So PR builds supersede; main / scheduled / dispatched runs serialize.
concurrency:
  group: Docs-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  UV_NO_SYNC: "1"

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Setup: checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # hatch-vcs reads tags to stamp the version shown in the docs
          persist-credentials: false
      - name: "Setup: install uv"
        uses: ./.github/actions/setup
        with:
          enable-cache: "false" # no cache in the Pages publish path (cache-poisoning hardening)
      - name: "Setup: sync docs dependencies"
        run: uv sync --locked --no-default-groups --group docs
      - name: "Docs: build (warnings are errors)"
        run: uv run sphinx-build -W -b html docs docs/_build/html
      - name: "Docs: run the example doctests"
        run: uv run sphinx-build -b doctest docs docs/_build/doctest
      - name: "Docs: upload Pages artifact"
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && vars.PAGES_ENABLED == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/_build/html

  deploy:
    needs: build
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && vars.PAGES_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GitHub's recommended Pages single-queue: never cancel an in-flight deploy.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write # publish to Pages
      id-token: write # OIDC token the deploy action verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # No in-workflow retry: the deploy runs on the nightly schedule / on demand, decoupled from merges, so a transient
      # "Deployment failed, try again later" from the Pages backend simply re-publishes on the next cadence (or a manual
      # dispatch) rather than reddening a merge.
      - name: "Pages: deploy"
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # Verify every external reference resolves, out of band. Runs ONLY on the nightly schedule and on demand -- never on
  # push/PR -- so a dead upstream link (or an anti-bot 403) surfaces as a maintenance signal without ever reddening a
  # merge, the same decoupling the Pages deploy uses. Non-gating by construction: no merge-path job needs it and branch
  # protection does not require it. DOIs are ignored (conf.py): permanent by design, and their publisher targets 403 bots.
  linkcheck:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Setup: checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Setup: install uv"
        uses: ./.github/actions/setup
      - name: "Setup: sync docs dependencies"
        run: uv sync --locked --no-default-groups --group docs
      - name: "Docs: check external reference links"
        run: uv run sphinx-build -b linkcheck docs docs/_build/linkcheck
