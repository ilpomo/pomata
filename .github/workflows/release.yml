name: Release

# Releasing is UI-driven: GitHub -> Releases -> Draft a new release -> choose the tag `vX.Y.Z` (create on publish) ->
# Generate release notes -> Publish. Publishing fires this workflow, which builds the sdist + wheel, validates them,
# and publishes to PyPI via Trusted Publishing (OIDC, no API token). hatch-vcs derives the package version from the
# tag, so the tag *is* the version. The workflow is inert on ordinary pushes and PRs -- only a published Release
# triggers it. PyPI is the artifact home: `skip-existing` makes re-publishing a no-op, and the wheel/sdist are not
# attached to the Release.
#
# One-time prerequisites (already configured; listed for the record):
#   - PyPI -> Publishing -> pending publisher: project `pomata`, owner `ilpomo`, repo `pomata`,
#     workflow `release.yml`, environment `pypi`.
#   - GitHub -> Settings -> Environments -> environment `pypi`.
on:
  release:
    types: [published]

# Least-privilege token: the top-level scope is read-only; each job widens to exactly what it needs.
permissions:
  contents: read

# Never cancel an in-flight publish: serialize overlapping release events (e.g. publish then a quick edit-republish).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # Build the sdist + wheel once and hand them to the publish/attach jobs as an artifact, so both ship the identical,
  # already-validated files.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # checkout
      id-token: write # mint the build-provenance attestation (Sigstore OIDC)
      attestations: write # record the attestation in the repo's attestations store
    steps:
      - name: "Setup: checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # hatch-vcs reads the tag history to stamp the version
          persist-credentials: false
      # Fail closed before building anything: the tag must point at a commit already on main (i.e. one that went
      # through the gated merge path -- a tag on a stray commit publishes nothing), and CITATION.cff must carry the
      # tag's version so the citation metadata can never ship one release stale again.
      - name: "Guard: tag is on main and CITATION.cff matches it"
        run: |
          git fetch --no-tags --quiet origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || { echo "::error::release tag is not on main"; exit 1; }
          version="${GITHUB_REF_NAME#v}"
          grep -q "^version: ${version}$" CITATION.cff || { echo "::error::CITATION.cff version does not match tag ${version}"; exit 1; }
          # date-released must match the (UTC) commit date of the release-prep bump that last touched CITATION.cff --
          # a version bumped with a stale date fails here, before anything is built. Same-day expectation: the bump PR
          # merges and the tag is cut on the same UTC day; a timezone straddle means re-tagging after the fix.
          cff_date=$(grep -oE '^date-released: [0-9-]+' CITATION.cff | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          bump_date=$(git log -1 --format=%cs -- CITATION.cff)
          [ -n "$cff_date" ] && [ "$cff_date" = "$bump_date" ] || { echo "::error::CITATION.cff date-released (${cff_date}) does not match its last bump commit date (${bump_date})"; exit 1; }
      - name: "Setup: install uv"
        uses: ./.github/actions/setup
        with:
          enable-cache: "false" # no cache in the PyPI publish path (cache-poisoning hardening)
      - name: "Build: sdist + wheel"
        run: uv build
      - name: "Build: validate the distribution metadata"
        # Pin twine so the release path resolves a fixed version rather than whatever is current at run time (a bump is
        # manual: a version in a `run:` string is outside Dependabot's reach).
        run: uvx twine@6.2.0 check --strict dist/*
      - name: "Build: attest build provenance (SLSA)"
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*"
      - name: "Build: upload the distribution artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # Publish to PyPI through Trusted Publishing: GitHub mints a short-lived OIDC token that PyPI exchanges for upload
  # credentials, so there is no long-lived API token to store or leak. PEP 740 attestations are emitted by default.
  pypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/pomata
    permissions:
      id-token: write # OIDC token Trusted Publishing exchanges for a short-lived PyPI credential
    steps:
      - name: "Release: download the distribution artifact"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: "Release: publish to PyPI (Trusted Publishing)"
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true # re-publishing an already-uploaded version is a no-op, not an error
