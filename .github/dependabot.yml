# Dependabot keeps the uv lockfile and the GitHub Actions pins current -- weekly, grouped to avoid PR spam.
# Reference: https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference
version: 2

updates:
  # Python dependencies (pyproject.toml + uv.lock). "uv" is the native, GA ecosystem for uv projects; "pip" would
  # not understand uv.lock. Minor and patch bumps are grouped into one PR each (runtime vs development) while major
  # bumps arrive ungrouped, so every potentially breaking change is reviewed on its own.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # A week of cooldown before a fresh release is proposed: a compromised package published right before the scan
    # is not pulled in blind (zizmor: dependabot-cooldown).
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      uv-production:
        applies-to: version-updates
        dependency-type: "production"
        patterns: ["*"]
        update-types: ["minor", "patch"]
      uv-development:
        applies-to: version-updates
        dependency-type: "development"
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions pins across .github/workflows AND the composite action (its setup-uv pin is invisible to the
  # default "/" directory, which only scans workflows). All minor and patch bumps land in one PR; majors ungrouped.
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/setup"
    schedule:
      interval: "weekly"
      day: "monday"
    # A week of cooldown before a fresh release is proposed: a compromised package published right before the scan
    # is not pulled in blind (zizmor: dependabot-cooldown).
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      github-actions:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # pre-commit hook revisions in .pre-commit-config.yaml: only the generic hygiene hooks (pre-commit/pre-commit-hooks)
  # carry a rev -- the lint tools run from uv.lock through local `uv run` hooks, so they have no rev to bump here.
  # (Dependabot pre-commit support: GA 2026-03-10.)
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # A week of cooldown before a fresh release is proposed: a compromised package published right before the scan
    # is not pulled in blind (zizmor: dependabot-cooldown).
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      pre-commit:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
