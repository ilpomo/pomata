name: Setup uv
description: >-
  Install the pinned uv and provision Python. This is the single source of truth for the uv version across every
  workflow: the version string and the setup-uv pin live here and nowhere else, so a bump is a one-line change and
  cannot drift between files. Checkout stays in the caller (a local action cannot check the repo out before it loads,
  and the fetch-depth differs per job).
inputs:
  python-version:
    description: The Python version uv provisions for the run.
    default: "3.14"
  enable-cache:
    description: Enable uv's cache; pass "false" in the publish paths (cache-poisoning hardening).
    default: "true"
runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: "0.11.25" # the one pinned uv version for all of CI/CD; keep the pre-commit uv-pre-commit rev in step
        python-version: ${{ inputs.python-version }}
        enable-cache: ${{ inputs.enable-cache }}
