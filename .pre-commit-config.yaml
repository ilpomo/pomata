# Local pre-commit hooks mirroring the CI lint/format gate, plus a uv.lock consistency check. Run them with
# `uvx pre-commit install` / `uvx pre-commit run --all-files` -- pre-commit is not added as a project dependency.
# Heavy type-checking (mypy / pyright / pyrefly / ty) stays in CI, not here. The lint tools run through `uv run`, so
# every hook executes exactly the version locked in uv.lock -- one source of truth, no hook rev to keep in step.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (locked version)
        entry: uv run --group lint ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format (locked version)
        entry: uv run --group lint ruff format --force-exclude
        language: system
        types_or: [python, pyi]
      - id: codespell
        name: codespell (locked version)
        entry: uv run --group lint codespell
        language: system
        types: [text]
      - id: uv-lock
        name: uv lock --check
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md] # a two-space Markdown hard line break is content, not stray whitespace
